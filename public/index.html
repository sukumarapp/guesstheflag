<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Guess the Flag</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main>
      <section class="landing-page" id="landingPage">
        <div class="landing-card">
          <p class="welcome-line">Welcome to CIBC Employee Appreciation Week</p>
          <h1>Guess the Flag</h1>
          <div class="join-strip">
            <input id="nameInput" maxlength="22" autocomplete="nickname" placeholder="Enter your name">
            <button id="joinButton">Join</button>
          </div>
          <p id="joinMessage" class="message">Up to 300 players can play together online.</p>
          <p class="subtitle">Developed by Sukumar</p>
        </div>
      </section>

      <section class="app-shell" id="gamePage" hidden>
        <section class="game-panel">
          <div id="roundOverlay" class="round-overlay" aria-live="polite"></div>
          <div class="topbar">
            <div>
              <p class="eyebrow">Round <span id="roundNumber">0</span></p>
              <h2>Guess the Flag</h2>
            </div>
            <div class="room-meter"><span id="onlineCount">0</span><small>/ 300 online</small></div>
          </div>

          <div class="visual-card">
            <div id="visual" class="visual waiting-visual">Host picks a flag</div>
          </div>

          <div id="options" class="options" aria-label="Answer options"></div>
          <p id="message" class="message">Waiting for the host to start.</p>
          <div id="roundPoints" class="round-points" hidden></div>

          <div class="host-tools" id="hostTools" hidden>
            <div>
              <p class="eyebrow">Host controls</p>
              <strong>Choose a flag</strong>
            </div>
            <div class="host-entry">
              <div class="host-pickers">
                <select id="continentSelect" aria-label="Continent"></select>
                <select id="challengeSelect" aria-label="Country"></select>
              </div>
              <div class="host-actions">
                <label class="volume-control">
                  <span>Music volume</span>
                  <span class="volume-slider">
                    <span class="volume-fill"></span>
                    <span class="volume-thumb"></span>
                    <input id="musicVolume" type="range" min="0" max="100" value="35">
                  </span>
                </label>
                <button id="startButton">Start round</button>
                <button id="revealButton" class="secondary">Reveal</button>
                <button id="resetButton" class="secondary">Reset game</button>
                <button id="musicButton" class="secondary">Music off</button>
                <button id="endButton" class="secondary danger-button">End games</button>
              </div>
            </div>
          </div>
        </section>

        <aside class="side-panel">
          <div class="score-head">
            <h2>Players</h2>
            <span id="capacity">Room open</span>
          </div>
          <button id="logoutButton" class="secondary logout-button">Log out</button>
          <p id="hostNotice" class="host-notice">Join to become host.</p>
          <ol id="players" class="players"></ol>
        </aside>
      </section>
    </main>
    <audio id="backgroundMusic" src="/music/background.mp3" loop preload="auto"></audio>
    <script src="/client.js"></script>
  </body>
</html>
